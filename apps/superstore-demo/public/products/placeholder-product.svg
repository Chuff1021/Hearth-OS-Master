<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">A Cozy Fireplace product photo placeholder</title>
  <desc id="desc">A Cozy Fireplace branded placeholder for products with no photo available.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#F3E4D3"/>
    </linearGradient>
    <linearGradient id="flame" x1="600" y1="315" x2="600" y2="645" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB545"/>
      <stop offset="1" stop-color="#E95F16"/>
    </linearGradient>
    <filter id="shadow" x="120" y="112" width="960" height="990" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#4A2F1C" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="138" y="130" width="924" height="920" rx="44" fill="#FFFDF8" stroke="#E5C8A9" stroke-width="4"/>
  </g>

  <image href="/acozy-logo.png" x="310" y="198" width="580" height="205" preserveAspectRatio="xMidYMid meet"/>

  <g transform="translate(0 18)">
    <path d="M600 338C560 408 516 464 516 535C516 622 586 692 674 692C761 692 832 623 832 536C832 472 795 426 756 380C724 342 693 306 681 258C660 298 634 323 600 338Z" fill="#8B3A18" opacity="0.12"/>
    <path d="M562 580C562 520 612 486 626 424C654 474 710 511 710 581C710 623 676 657 636 657C595 657 562 623 562 580Z" fill="url(#flame)"/>
    <path d="M637 632C613 632 594 612 594 588C594 556 624 535 632 500C651 529 681 551 681 588C681 612 661 632 637 632Z" fill="#FFE2A6"/>
  </g>

  <rect x="300" y="748" width="600" height="130" rx="26" fill="#2F2418"/>
  <text x="600" y="817" text-anchor="middle" fill="#FFF8EC" font-size="43" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="0.5">No product photo available</text>
  <text x="600" y="862" text-anchor="middle" fill="#F4C17A" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="600">A Cozy Fireplace</text>

  <text x="600" y="970" text-anchor="middle" fill="#6E5845" font-size="28" font-family="Arial, Helvetica, sans-serif">We&apos;re working to add accurate product imagery.</text>
</svg>
